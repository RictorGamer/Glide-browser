name: Build Windows Executable

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-WebEngine pyinstaller

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --collect-all PyQt6 --collect-all PyQt6.QtWebEngineWidgets app.py

    # Шаг архивации: превращаем 3770 файлов в один архив
    - name: Archive build
      shell: pwsh
      run: |
        Compress-Archive -Path dist/app/* -DestinationPath browser_windows_x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Browser-Windows-Build
        path: browser_windows_x64.zip
        # Сокращаем срок хранения до 1 дня, чтобы не забивать квоту
        retention-days: 1
